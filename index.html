<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F5EFE6;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #2A2622;
    text-align: center;
    padding: 24px;
  }
  img {
    width: 160px;
    height: 160px;
    border-radius: 32px;
    object-fit: cover;
    margin-bottom: 28px;
    box-shadow: 0 12px 40px rgba(62,58,54,0.18);
  }
  h1 {
    font-family: Georgia, serif;
    font-weight: 500;
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: #5E5650;
    font-size: 14px;
    margin-bottom: 32px;
    font-weight: 500;
  }
  button, .btn {
    background: #B8956A;
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover, .btn:hover { background: #9A7A52; }
  button:active, .btn:active { transform: scale(0.98); }
  .hint {
    margin-top: 24px;
    font-size: 12px;
    color: #8B8278;
    max-width: 280px;
    line-height: 1.5;
  }
</style>
